name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20
          - 22

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build package
        run: npm run build

      - name: Smoke test SQLite flow
        run: npm run smoke:sqlite

      - name: Pack npm artifact
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          package_file="$(npm pack --silent)"
          echo "package_file=$package_file" >> "$GITHUB_OUTPUT"

      - name: Verify packaged CLI
        run: npx --yes "./${{ steps.pack.outputs.package_file }}" --help
